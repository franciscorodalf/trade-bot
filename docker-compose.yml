services:
  bot:
    build: .
    container_name: polymarket-bot
    command: python run.py
    volumes:
      - ./database:/app/database
      - ./logs:/app/logs
      - ./bot/models:/app/bot/models
    env_file: .env
    restart: unless-stopped

  api:
    build: .
    container_name: polymarket-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./database:/app/database
      - ./logs:/app/logs
    depends_on:
      - bot
    restart: unless-stopped
